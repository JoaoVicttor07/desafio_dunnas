default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("POSTGRES_HOST", "db") %>
  username: <%= ENV.fetch("POSTGRES_USER", "postgres") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "senha_dummy") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: desafio_dunnas_development

test:
  <<: *default
  database: desafio_dunnas_test

production:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB") { "desafio_dunnas_production" } %>