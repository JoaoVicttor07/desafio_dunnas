services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Qv7mN2rX9pL4tK8zD1sF6wH3
      POSTGRES_DB: desafio_dunnas_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d desafio_dunnas_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: joaovictorsdc/desafio_dunnas:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      POSTGRES_HOST: db
      POSTGRES_DB: desafio_dunnas_production
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Qv7mN2rX9pL4tK8zD1sF6wH3
      RAILS_MASTER_KEY: e71c0183c3f2523482a9a13897d9bc34
      SECRET_KEY_BASE: 6c1f3e9a8b2d4c7f0a5e1b9d3f6c8a2e7b4d1f9c6a3e8b0d5f2c7a1e9b4d6f3a8c2e1d7f9b5a4c6e3d0f8a1b7c9e2d
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_LEVEL: info
      RAILS_MAX_THREADS: "5"
      REQUIRE_MASTER_KEY: "true"
      ACTIVE_STORAGE_SERVICE: local
      FORCE_SSL: "true"
      ASSUME_SSL: "true"
      ADMIN_EMAIL: admin@admin.com
      ADMIN_PASSWORD: "123456"
    ports:
      - "3500:3500"
    command: ["/bin/sh", "-c", "bundle exec rails db:migrate && bundle exec rails db:seed && ./bin/rails server -b 0.0.0.0 -p 3500"]
    volumes:
      - app_storage:/rails/storage

volumes:
  postgres_data:
  app_storage: